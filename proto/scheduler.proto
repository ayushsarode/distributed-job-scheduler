syntax = "proto3";

package scheduler.v1;

option go_package = "github.com/ayushsarode/distributed-job-scheduler/proto/schedulerpb";

service WorkerControlService {
    rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
    rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse);
    rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
}


message RegisterWorkerRequest {
    string host = 1;
}
message RegisterWorkerResponse {
    string worker_id = 1;
}
message DrainWorkerRequest {
    string worker_id = 1;
}
message DrainWorkerResponse {
    bool acknowledged = 1;
}
message CancelJobRequest {
    string worker_id = 1;
    string job_id = 2;
}
message CancelJobResponse {
    bool cancelled = 1;
}